site_name: RAbHIT
site_description: R Antibody Haplotype Inference Tool — V-D-J haplotype and gene deletion inference from AIRR-seq data
site_url: https://ayeletperes.github.io/rabhit/
repo_url: https://github.com/ayeletperes/rabhit
repo_name: ayeletperes/rabhit
docs_dir: site_docs
use_directory_urls: false

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: white
    accent: green
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Input format: input.md
  - Tutorial: tutorial.md
  - Allele clusters (ASC/OGRDB): allele_clusters.md
  - Function reference: reference.md
  - Citation: citation.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
